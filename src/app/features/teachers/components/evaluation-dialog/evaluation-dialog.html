<p-dialog
  [visible]="visible()"
  (visibleChange)="visible.set($event)"
  (onHide)="onHide()"
  [header]="
    (isEditMode ? 'TEACHERS.EVALUATION.DIALOG_TITLE_EDIT' : 'TEACHERS.EVALUATION.DIALOG_TITLE_ADD')
      | translate
  "
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [style]="{ width: '480px' }"
  [breakpoints]="{ '640px': '95vw' }"
  appendTo="body"
>
  <form [formGroup]="form" (ngSubmit)="onSave()" id="evalForm">
    <div class="flex flex-col gap-4">
      <!-- Reviewer Name -->
      <app-form-field
        type="text"
        formControlName="reviewerName"
        label="TEACHERS.EVALUATION.REVIEWER_NAME"
      />

      <!-- Rating — p-rating (interactive stars) — not via app-form-field -->
      <div class="flex flex-col gap-1">
        <label class="text-sm font-medium text-[#344054]">
          {{ 'TEACHERS.EVALUATION.RATING' | translate }}
          <span class="text-red-500 ms-0.5">*</span>
        </label>
        <p-rating formControlName="rating" [stars]="5" />
        @if (form.get('rating')?.invalid && form.get('rating')?.touched) {
          <small class="text-red-500 text-xs">
            {{ 'FORM.ERRORS.REQUIRED' | translate }}
          </small>
        }
      </div>

      <!-- Comment -->
      <app-form-field
        type="textarea"
        formControlName="comment"
        label="TEACHERS.EVALUATION.COMMENT"
        [rows]="3"
      />

    </div>
  </form>

  <ng-template #footer>
    <div class="flex gap-3 ms-auto">
      <p-button
        type="button"
        [label]="'COMMON.CANCEL' | translate"
        severity="secondary"
        [text]="true"
        [disabled]="saving()"
        (onClick)="onCancel()"
      />
      <p-button
        form="evalForm"
        type="submit"
        [label]="
          (isEditMode ? 'TEACHERS.EVALUATION.BTN_SAVE' : 'TEACHERS.EVALUATION.BTN_ADD') | translate
        "
        [loading]="saving()"
        (onClick)="onSave()"
      />
    </div>
  </ng-template>
</p-dialog>
