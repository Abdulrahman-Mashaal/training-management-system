<p-toast position="top-right" />
<p-confirmDialog [style]="{ width: '450px' }" [breakpoints]="{ '768px': '95vw' }" />

<div class="flex h-screen bg-gray-50 dark:bg-gray-950 overflow-hidden">
  <!-- Sidebar - Hidden on mobile, fixed width on desktop -->
  <div class="hidden lg:block w-64 flex-shrink-0 h-full">
    <app-sidebar></app-sidebar>
  </div>

  <!-- Mobile Sidebar Overlay -->
  @if (isSidebarOpen) {
    <div
      class="lg:hidden fixed inset-0 z-40 bg-gray-900/50 backdrop-blur-sm transition-opacity"
      (click)="isSidebarOpen = false"
    ></div>
  }

  <!-- Mobile Sidebar Drawer — slides from left in LTR, from right in RTL -->
  <div
    class="lg:hidden fixed inset-y-0 z-50 w-64 bg-white dark:bg-gray-900 shadow-xl transform transition-transform duration-300 ease-in-out"
    [class.left-0]="!isRtl()"
    [class.right-0]="isRtl()"
    [class.translate-x-0]="isSidebarOpen"
    [class.-translate-x-full]="!isSidebarOpen && !isRtl()"
    [class.translate-x-full]="!isSidebarOpen && isRtl()"
  >
    <app-sidebar (closeSidebar)="isSidebarOpen = false"></app-sidebar>
  </div>

  <!-- Main Content Wrapper -->
  <div class="flex-1 flex flex-col h-full min-w-0 overflow-hidden">
    <!-- Header -->
    <app-header class="flex-shrink-0" (toggleSidebar)="toggleSidebar()"></app-header>

    <!-- Scrollable Content Area -->
    <main class="flex-1 overflow-y-auto pt-4 md:pt-6 scroll-smooth px-4 md:px-6">
      <div class="container mx-auto min-h-[calc(100vh-10rem)]">
        <router-outlet></router-outlet>
      </div>

      <!-- Footer stays at bottom of content or pushed down if content is short -->
      <app-footer class="mt-auto block pt-6"></app-footer>
    </main>
  </div>
</div>
