<aside
  class="h-full bg-white dark:bg-gray-900 border-r border-gray-200 dark:border-gray-700 flex flex-col"
>
  <div class="p-6 border-b border-gray-200 dark:border-gray-700 flex items-center gap-2">
    <i class="pi pi-box text-2xl text-primary-500"></i>
    <span class="font-bold text-xl text-gray-800 dark:text-white">{{ 'SIDEBAR.TITLE' | translate }}</span>
  </div>

  <nav class="flex-1 overflow-y-auto py-4 px-3">
    <ul class="space-y-1">
      @for (item of menuItems; track item.label) {
        <li>
          <a
            [routerLink]="item.route"
            routerLinkActive="bg-primary-50 text-primary-600 dark:bg-primary-900/20 dark:text-primary-400"
            class="flex items-center gap-3 px-3 py-2 rounded-md text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors cursor-pointer"
            (click)="closeSidebar.emit()"
          >
            <i class="pi" [class]="item.icon"></i>
            <span>{{ item.label | translate }}</span>
          </a>
        </li>
      }
    </ul>
  </nav>

  <div class="p-4 border-t border-gray-200 dark:border-gray-700 flex flex-col gap-2">
    <!-- Language Switcher — mobile only (desktop version lives in the header) -->
    <div class="lg:hidden">
      <app-lang-switcher />
    </div>

    <button
      class="w-full flex items-center gap-3 px-3 py-2 rounded-md text-gray-600 dark:text-gray-300 hover:bg-red-50 hover:text-red-600 dark:hover:bg-red-900/20 dark:hover:text-red-400 transition-colors cursor-pointer"
      (click)="closeSidebar.emit()"
    >
      <i class="pi pi-sign-out rtl:scale-x-[-1]"></i>
      <span>{{ 'SIDEBAR.LOGOUT' | translate }}</span>
    </button>
  </div>
</aside>
